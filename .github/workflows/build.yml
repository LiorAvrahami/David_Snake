name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Collect APK
        run: cp app/build/outputs/apk/debug/app-debug.apk david-snake.apk

      - name: Move the "latest" tag to this commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: David Snake — latest build
          body: |
            Automatic debug build of the newest commit.
            Download **david-snake.apk** below and open it on your phone to install.
          files: david-snake.apk
